<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raden - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-container">
        
        <div class="left-side">
            <div class="content-wrapper">
                <div class="header-warning">
                    <svg class="warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                        <line x1="22" y1="10" x2="22" y2="14" stroke-width="3"></line>
                    </svg>
                    <h2>ATENÇÃO!</h2>
                </div>

                <p class="notice-text">
                    Este sistema é de uso <span class="highlight">exclusivo</span> para funcionários registrados da empresa.<br>
                    Caso você não possua credenciais de acesso, entre em contato com o setor responsável.
                </p>

                <form class="login-form">
                    <div class="input-group">
                        <label for="id">ID</label>
                        <input type="text" id="id" required autocomplete="off">
                    </div>
                    
                    <div class="input-group">
                        <label for="senha">SENHA</label>
                        <input type="password" id="senha" required>
                    </div>
                    <button type="submit" class="btn-login">LOGIN</button>
                </form>
            </div>
        </div>

        <div class="right-side">
            <div class="logo-wrapper">
                <img src="../imagens/Design sem nome.svg" alt="Logo">
            </div>
        </div>

    </div>

</body>
</html>
