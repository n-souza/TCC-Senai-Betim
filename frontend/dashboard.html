<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela de Gerenciamento</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"/>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="shortcut icon" href="images/favicon.svg" type="image/x-icon">
</head>

<body>
    <header class="header-top-externo">
        <button class="btn-externo-icone btn-historico" id="btnVerHistorico" onclick="verHistorico()" title="Histórico de Alterações">
            <span class="material-symbols-outlined">history</span>
        </button>
        <button class="btn-externo-icone btn-arquivados" id="btnVerArquivados" onclick="verArquivados()" title="Visualizar Itens Arquivados">
            <span class="material-symbols-outlined">archive</span>
        </button>
    </header>

    <main class="container">
        <section class="toolbar" id="toolbarContainer">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Pesquisar...">
                <span class="search-icon">&#128269;</span>
            </div>
            
            <div class="button-group" id="botoesPadrao">
                <button class="btn btn-editar" onclick="ativarModoEdicao()">EDITAR/ARQUIVAR</button>
                <button class="btn btn-adicionar" onclick="abrirParaCadastrar()">ADICIONAR</button>
            </div>

            <div class="button-group" id="avisoSelecao" style="display: none;">
                <button class="btn btn-selecionar" style="background-color: #5c913b; cursor: default;">Selecione o Objeto</button>
                <button class="btn btn-cancelar" onclick="cancelarModoEdicao()" style="background-color: #5c913b; padding: 10px 15px;">X</button>
            </div>
        </section>

        <section class="table-container">
            <table class="custom-table">
                <thead>
                    <tr>
                        <th>TAG</th>
                        <th>NOME</th>
                        <th>SETOR</th>
                        <th class="thObservacao">OBSERVAÇÃO</th>
                        <th id="thCriticidade" onclick="ordenarPorCriticidade()" style="cursor: pointer; user-select: none;">CRITICIDADE <span id="setaCriticidade">↕</span></th>
                        <th id="thEtapa" onclick="ordenarPorEtapa()" style="cursor: pointer; user-select: none;">ETAPA <span id="setaEtapa">↕</span></th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </section> 

        <nav class="paginacao-container" aria-label="Paginação da tabela">
            <button class="btn-paginacao" id="btnTabelaAnterior" onclick="mudarPaginaTabela(-1)">&lt;</button>
            <span class="info-paginacao" id="infoPaginaTabela">1 / 1</span>
            <button class="btn-paginacao" id="btnTabelaProxima" onclick="mudarPaginaTabela(1)">&gt;</button>
        </nav>
    </main>

    <div class="modal-overlay" id="modalEquipamento">
        <div class="modal-box">
            <header class="modal-header">
                <h2 id="modalTitle">Editar Equipamento</h2>
                <button class="close-btn" onclick="fecharModal()">X</button>
            </header>
            
            <form class="modal-form" id="formEquipamento">
                <div class="form-group">
                    <label for="inputTag">TAG</label>
                    <input type="text" id="inputTag" placeholder="Gerado automaticamente" required disabled>
                </div>

                <div class="form-group">
                    <label for="inputNome">Nome do Equipamento</label>
                    <input type="text" id="inputNome" placeholder="Ex: Bomba de Polpa" required autocomplete="off" list="listaNomesRecomendados">
                    <datalist id="listaNomesRecomendados"></datalist>
                </div>

                <div class="form-group">
                    <label for="inputSetor">Setor</label>
                    <input type="text" id="inputSetor" placeholder="Ex: Planta de Beneficiamento" autocomplete="off" list="listaSetoresRecomendados">
                    <datalist id="listaSetoresRecomendados"></datalist>
                </div>

                <div class="form-group">
                    <label for="txtDescricao">Descrição Técnica</label>
                    <textarea id="txtDescricao" rows="3" placeholder="Especificações do item..." maxlength="300"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="selectCriticidade">Criticidade</label>
                        <select id="selectCriticidade">
                            <option value="baixa">Baixa</option>
                            <option value="media">Média</option>
                            <option value="alta">Alta</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="selectEtapa">Etapa de Reparo</label>
                        <select id="selectEtapa">
                            <option value="envio">Envio</option>
                            <option value="peritagem">Peritagem</option>
                            <option value="aprovacao">Aprovação</option>
                            <option value="execucao">Execução</option>
                            <option value="retorno">Retorno</option>
                        </select>
                    </div>
                </div>

                <footer class="modal-footer-buttons">
                    <button type="button" class="btn-modal-arquivar" id="btnArquivarModal" onclick="arquivarEquipamento()">ARQUIVAR</button>
                    <button type="button" class="btn-modal-arquivar" id="btnDesarquivarModal" onclick="desarquivarEquipamento()" style="display: none; background-color: #448639; border-color: #386f2f;">DESARQUIVAR</button>
                    <button type="submit" class="btn-salvar">SALVAR ALTERAÇÕES</button>
                </footer>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalHistorico">
        <div class="modal-box modal-historico-largura">
            <header class="modal-header modal-historico-header">
                <h2>Histórico de Alterações</h2>
                <button class="close-btn modal-historico-close" onclick="fecharModalHistorico()">X</button>
            </header>
            
            <div class="filtro-pdf-container">
                <div class="filtro-datas-wrapper">
                    <div class="filtro-data-grupo">
                        <label for="dataInicio" class="filtro-data-label">DE:</label>
                        <input type="date" id="dataInicio" class="filtro-data-input">
                    </div>
                    <div class="filtro-data-grupo">
                        <label for="dataFim" class="filtro-data-label">ATÉ:</label>
                        <input type="date" id="dataFim" class="filtro-data-input">
                    </div>
                </div>
                
                <button class="btn btn-gerar-pdf" onclick="baixarHistorico()">
                    <span class="material-symbols-outlined">file_save</span> GERAR PDF        
                </button>
            </div>
            
            <div id="listaHistorico" class="lista-historico-corpo"></div>
            
            <nav class="paginacao-container" style="margin-top: 15px; margin-bottom: 5px;" aria-label="Paginação do histórico">
                <button class="btn-paginacao" id="btnHistAnterior" onclick="mudarPaginaHist(-1)">&lt;</button>
                <span class="info-paginacao" id="infoPaginaHist">1 / 1</span>
                <button class="btn-paginacao" id="btnHistProxima" onclick="mudarPaginaHist(1)">&gt;</button>
            </nav>
        </div>
    </div>

    <script src="js/api.js" defer></script>
    <script src="js/dashboard.js" defer></script>
</body>
</html>
