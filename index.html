<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raden - Login</title>
    <link rel="stylesheet" href="frontend/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="shortcut icon" href="frontend/imagens/favicon.svg" type="image/x-icon">
</head>
<body>

    <div class="login-container">
        
        <div class="left-side">
            <div class="content-wrapper">
                <div class="header-warning">
                    <span id="user_icon" class="material-symbols-outlined">person</span>
                    <h2>ATENÇÃO!</h2>
                </div>

                <p class="notice-text">
                    Este sistema é de uso <span class="highlight">exclusivo</span> para funcionários registrados da empresa.<br>
                    Caso você não possua credenciais de acesso, entre em contato com o setor responsável.
                </p>

                <form class="login-form" id="loginForm" method="POST">
                    <div class="input-group">
                        <label for="id">ID</label>
                        <input type="text" id="id" name="id" required autocomplete="off">
                    </div>
                    
                    <div class="input-group">
                        <label for="senha">SENHA</label>
                        <input type="password" id="senha" name="senha" required>
                    </div>
                    
                    <button type="submit" class="btn-login">LOGIN</button>
                </form>
            </div>
        </div>

        <div class="right-side">
            <div class="logo-wrapper">
                <img src="frontend/imagens/Logo.svg" alt="Logo">
            </div>
        </div>

    </div>

    <script src="frontend/script/script.js"></script>
</body>
</html>
