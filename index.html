<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raden - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="frontend/css/login.css">
    <link rel="shortcut icon" href="frontend/images/favicon.svg" type="image/x-icon">
</head>
<body>

    <main class="login-container">
        
        <section class="left-side">
            <div class="content-wrapper">
                <header class="header-warning">
                    <span id="user_icon" class="material-symbols-outlined">person</span>
                    <h2>ATENÇÃO!</h2>
                </header>

                <p class="notice-text">
                    Este sistema é de uso <span class="highlight">exclusivo</span> para funcionários registrados da empresa.<br>
                    Caso você não possua credenciais de acesso, entre em contato com o setor responsável.
                </p>

                <form class="login-form" id="loginForm" method="POST" action="backend/api/ProcessarLogin.php">
                    <div class="input-group">
                        <label for="email">Email Corporativo *</label>
                        <input type="email" id="email" name="email" required autocomplete="off">
                    </div>
                    
                    <div class="input-group">
                        <label for="senha">SENHA *</label>
                        <input type="password" id="senha" name="senha" required>
                    </div>
                    
                    <button type="submit" class="btn-login">LOGIN</button>
                </form>
                
                <div id="msgerro" role="alert"> 
                    <p>ERRO: Dados incorretos. Tente novamente.</p>
                </div>
            </div>
        </section>

        <aside class="right-side">
            <div class="logo-wrapper">
                <img src="frontend/images/Logo.svg" alt="Logo Raden">
            </div>
        </aside>

    </main>

    <script src="frontend/js/login.js"></script>
</body>
</html>
